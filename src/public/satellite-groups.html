<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IBA Satellite Groups</title>
    <link rel="stylesheet" href="/styles.css?v=20260423" />
  </head>
  <body>
    <div class="bg-orb bg-orb-a" aria-hidden="true"></div>
    <div class="bg-orb bg-orb-b" aria-hidden="true"></div>

    <header class="app-header">
      <div class="brand">
        <p class="kicker">Indiana Blacksmithing Association</p>
        <h1>Satellite Groups</h1>
      </div>
      <div class="header-actions">
        <p class="header-note">Browse active, opted-in members grouped by their satellite chapter.</p>
        <button id="themeToggle" class="btn theme-toggle" type="button" aria-pressed="false">Switch to Light Mode</button>
        <button class="btn theme-reset" type="button" data-theme-reset="true">Reset Theme</button>
      </div>
    </header>

    <main class="layout">
      <section class="panel controls-panel">
        <h2>Search</h2>
        <form id="filtersForm" class="form-grid compact">
          <label class="full-width">
            Search groups or members
            <input id="searchInput" name="search" type="search" placeholder="Group name, member name, or email…" autocomplete="off" />
          </label>
          <button id="refreshBtn" type="submit" class="btn btn-primary">Refresh</button>
        </form>
      </section>

      <section class="panel members-panel">
        <div class="panel-heading">
          <h2>Groups</h2>
          <p id="groupCount">0 groups</p>
        </div>
        <ul id="groupList" class="member-list"></ul>
      </section>

      <section class="panel detail-panel">
        <div class="panel-heading">
          <h2>Group Members</h2>
          <p id="selectedGroupHint">Select a group to view members.</p>
        </div>
        <div id="groupDetails" class="member-details empty">No group selected.</div>
      </section>
    </main>

    <aside id="toast" class="toast" aria-live="polite"></aside>

    <script src="/config.js?v=20260423" defer></script>
    <script src="/theme.js?v=20260423" defer></script>
    <script src="/satellites.js?v=20260423" defer></script>
  </body>
</html>
