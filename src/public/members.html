<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IBA Member Directory</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="bg-orb bg-orb-a" aria-hidden="true"></div>
    <div class="bg-orb bg-orb-b" aria-hidden="true"></div>

    <header class="app-header">
      <div class="brand">
        <p class="kicker">Indiana Blacksmithing Association</p>
        <h1>Member Directory</h1>
      </div>
      <p class="header-note">Contact directory for members who have opted in to the membership list.</p>
    </header>

    <main class="layout">
      <section class="panel controls-panel">
        <h2>Search</h2>
        <form id="filtersForm" class="form-grid compact">
          <label class="full-width">
            Search members
            <input id="searchInput" name="search" type="search" placeholder="Name or email address…" autocomplete="off" />
          </label>
          <button id="refreshBtn" type="submit" class="btn btn-primary">Refresh</button>
        </form>
      </section>

      <section class="panel members-panel">
        <div class="panel-heading">
          <h2>Members</h2>
          <p id="memberCount">0 loaded</p>
        </div>
        <ul id="membersList" class="member-list"></ul>
      </section>

      <section class="panel detail-panel">
        <div class="panel-heading">
          <h2>Contact Info</h2>
          <p id="selectedMemberHint">Select a member to view contact information.</p>
        </div>
        <div id="memberDetails" class="member-details empty">No member selected.</div>
      </section>
    </main>

    <aside id="toast" class="toast" aria-live="polite"></aside>

    <script src="/public.js" defer></script>
  </body>
</html>
